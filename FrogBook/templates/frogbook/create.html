{% extends 'base.html' %}

{% block header %}
<h1>{% block title %}New Post{% endblock %}</h1>
{% endblock %}

{% block content %}
<form method="post" enctype="multipart/form-data">
    <label for="name">Frog's Name</label>
    <input name="name" id="name" value="{{ request.form['name'] }}" required>
    <label for="image">Frog's Image</label>
    <input type="file" name="image" id="image" value="{{ request.files['image'] }}" required>
    <input type="submit" value="Save">
</form>
{% endblock %}
