{% extends 'base.html' %}

{% block header %}
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>{% block title %}New Frog{% endblock %}</h1>
        <a href="{{ url_for('frogbook.my_frogs') }}" class="btn btn-outline-secondary">Cancel</a>
    </div>
{% endblock %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow">
                <div class="card-body">
                    <form method="post" enctype="multipart/form-data">
                        <!-- Frog Name -->
                        <div class="mb-3">
                            <label for="name" class="form-label">Frog's Name</label>
                            <input type="text"
                                   class="form-control"
                                   name="name"
                                   id="name"
                                   value="{{ request.form['name'] }}"
                                   required>
                        </div>

                        <!-- Frog Image -->
                        <div class="mb-3">
                            <label for="image" class="form-label">Frog's Image</label>
                            <input type="file"
                                   class="form-control"
                                   name="image"
                                   id="image"
                                   accept="image/png, image/jpeg"
                                   required>
                            {% if request.files['image'] %}
                                <div class="form-text">Selected: {{ request.files['image'].filename }}</div>
                            {% endif %}
                        </div>

                        <!-- Submit Button -->
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg">Save Frog</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
