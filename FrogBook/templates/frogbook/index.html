{% extends 'base.html' %}



{% block header %}
    <h1>{% block title %}Home{% endblock %}</h1>
{% if g.user %}
<a class="action" href="{{ url_for('frogbook.create') }}">New</a>
{% endif %}
{% endblock %}

{% block content %}
    <h1>Top Frogs In The World</h1>
    {% for frog in frogs %}
    <article>
    <p>{{ frog["name"] }}</p>
    <p>Elo: {{ frog["elo"] }}</p>
    <img src="{{ frog["img"] }}" alt="{{ frog["name"] }}"/>
    </article>
    {% endfor %}

{% endblock %}
